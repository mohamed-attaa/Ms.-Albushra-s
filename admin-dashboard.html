<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Admin Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins', sans-serif;
}

body{
  display:flex;
  min-height:100vh;
  background: linear-gradient(135deg,#ffe6f0,#f3e8ff);
}

/* 🌸 SIDEBAR */
.sidebar{
  width:260px;
  background: linear-gradient(180deg,#ff6fa3,#a78bfa);
  color:white;
  padding:20px;
  transition:.3s;
  box-shadow: 10px 0 25px rgba(0,0,0,.08);
}

.sidebar h2{
  margin-bottom:30px;
  font-size:22px;
}

.sidebar button{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border:none;
  border-radius:12px;
  background: rgba(255,255,255,0.2);
  color:white;
  cursor:pointer;
  transition:.3s;
  font-weight:600;
  backdrop-filter: blur(10px);
}

.sidebar button:hover{
  background:white;
  color:#ff4d88;
  transform: translateX(5px);
}

/* 📱 MENU */
.menu-toggle{
  display:none;
  position:fixed;
  top:15px;
  left:15px;
  background:#ff4d88;
  color:white;
  border:none;
  padding:10px 12px;
  border-radius:10px;
  z-index:999;
}

/* MAIN */
.main{
  flex:1;
  padding:25px;
}

.header{
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(10px);
  padding:20px;
  border-radius:18px;
  margin-bottom:20px;
  box-shadow:0 10px 25px rgba(0,0,0,.05);
}

.header h2{
  color:#ff4d88;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

/* 🌸 CARDS */
.card{
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(12px);
  padding:20px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
  transition:.3s;
}

.card:hover{
  transform: translateY(-5px);
}

/* INPUTS */
input{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:12px;
  border:1px solid #eee;
  outline:none;
  transition:.3s;
}

input:focus{
  border-color:#ff4d88;
  box-shadow:0 0 8px rgba(255,77,136,0.2);
}

/* 🌸 BUTTON */
.btn{
  background: linear-gradient(135deg,#ff4d88,#a78bfa);
  color:white;
  border:none;
  padding:12px;
  border-radius:12px;
  cursor:pointer;
  width:100%;
  font-weight:600;
  transition:.3s;
}

.btn:hover{
  transform: scale(1.05);
  box-shadow:0 10px 20px rgba(255,77,136,0.3);
}

/* LIST */
.list-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#fff;
  padding:10px;
  border-radius:12px;
  margin-top:10px;
  box-shadow:0 5px 10px rgba(0,0,0,.05);
}

/* 🌸 PREVIEW */
.preview-card{
  margin-top:15px;
  padding:15px;
  border-radius:20px;
  background: linear-gradient(135deg,#ffb6c1,#c084fc);
  color:white;
  text-align:center;
  animation: fadeIn .4s ease;
}

.preview-card img{
  width:60px;
  height:60px;
  border-radius:50%;
  margin-bottom:10px;
  border:2px solid white;
}

/* ANIMATION */
@keyframes fadeIn{
  from{opacity:0; transform:scale(0.9)}
  to{opacity:1; transform:scale(1)}
}

/* SECTION */
.section{display:none}
.active{display:block}

/* 📱 RESPONSIVE */
@media(max-width:900px){
  .grid{grid-template-columns:1fr}
}

@media(max-width:768px){
  body{flex-direction:column}

  .menu-toggle{display:block}

  .sidebar{
    position:fixed;
    left:-260px;
    top:0;
    height:100%;
    z-index:998;
  }

  .sidebar.open{left:0}

  .main{padding:70px 15px}
}

</style>
</head>
<body>

<button class="menu-toggle" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>

<div class="sidebar" id="sidebar">
  <h2>⚙ Admin</h2>
  <button onclick="show('games')">🎮 Games</button>
  <button onclick="show('pdfs')">📄 PDFs</button>
  <button onclick="show('footer')">🦶 Footer</button>
</div>

<div class="main">

<div class="header">
  <h2>Dashboard</h2>
</div>

<div id="games" class="section active">
  <div class="grid">
    <div class="card">
      <h3>Add Game</h3>
      <input id="gName" placeholder="Game Name">
      <input id="gLink" placeholder="Game Link">
      <input id="gImg" placeholder="Image URL">
      <button class="btn" onclick="addGame()">Add</button>
      <div class="preview-card" id="previewGame"></div>
    </div>

    <div class="card">
      <h3>Games List</h3>
      <div id="gameList"></div>
    </div>
  </div>
</div>

<div id="pdfs" class="section">
  <div class="grid">
    <div class="card">
      <h3>Add PDF</h3>
      <input id="pName" placeholder="PDF Name">
      <input id="pFile" placeholder="PDF Link">
      <input id="pImg" placeholder="Image URL">
      <button class="btn" onclick="addPDF()">Add</button>
      <div class="preview-card" id="previewPDF"></div>
    </div>

    <div class="card">
      <h3>PDF List</h3>
      <div id="pdfList"></div>
    </div>
  </div>
</div>

<div id="footer" class="section">
  <div class="card">
    <h3>Edit Footer</h3>
    <input id="insta" placeholder="Instagram">
    <input id="email" placeholder="Email">
    <input id="phone" placeholder="Phone">
    <button class="btn" onclick="saveFooter()">Save</button>
  </div>
</div>

</div>

<script>
function toggleMenu(){
  document.getElementById('sidebar').classList.toggle('open')
}

function show(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'))
  document.getElementById(id).classList.add('active')
  document.getElementById('sidebar').classList.remove('open')
}

let games = JSON.parse(localStorage.getItem('games')) || []
let pdfs = JSON.parse(localStorage.getItem('pdfs')) || []

function render(){
  gameList.innerHTML = ''
  games.forEach((g,i)=>{
    gameList.innerHTML += `<div class='list-item'>${g.name}<button onclick='delGame(${i})'>X</button></div>`
  })

  pdfList.innerHTML = ''
  pdfs.forEach((p,i)=>{
    pdfList.innerHTML += `<div class='list-item'>${p.name}<button onclick='delPDF(${i})'>X</button></div>`
  })
}

function addGame(){
  games.push({name:gName.value,link:gLink.value,img:gImg.value})
  localStorage.setItem('games',JSON.stringify(games))
  render()
}

function addPDF(){
  pdfs.push({name:pName.value,file:pFile.value,img:pImg.value})
  localStorage.setItem('pdfs',JSON.stringify(pdfs))
  render()
}

function delGame(i){games.splice(i,1);localStorage.setItem('games',JSON.stringify(games));render()}
function delPDF(i){pdfs.splice(i,1);localStorage.setItem('pdfs',JSON.stringify(pdfs));render()}

function saveFooter(){
  localStorage.setItem('footer',JSON.stringify({
    insta:insta.value,
    email:email.value,
    phone:phone.value
  }))
  alert('Saved')
}

[gName,gImg].forEach(inp=>inp?.addEventListener('input',()=>{
  previewGame.innerHTML=`<img src='${gImg.value}'/><h4>${gName.value}</h4><button>▶ Play</button>`
}))

[pName,pImg].forEach(inp=>inp?.addEventListener('input',()=>{
  previewPDF.innerHTML=`<img src='${pImg.value}'/><h4>${pName.value}</h4><button>Download</button>`
}))

render()
</script>

</body>
</html>
