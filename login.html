<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Login</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: "Arial", sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;

  /* 🎨 خلفية أطفال */
  background: linear-gradient(135deg, #ffecd2, #fcb69f);
  overflow:hidden;
  position:relative;
}

/* ⭐ دوائر خلفية */
body::before,
body::after{
  content:"";
  position:absolute;
  width:300px;
  height:300px;
  border-radius:50%;
  background: rgba(255,255,255,0.2);
  filter: blur(40px);
}

body::before{
  top:-80px;
  left:-80px;
}

body::after{
  bottom:-80px;
  right:-80px;
}

/* 🧊 الكارد */
.container{
  width:380px;
  background: rgba(255,255,255,0.25);
  backdrop-filter: blur(15px);
  padding:30px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  text-align:center;
  border:1px solid rgba(255,255,255,0.4);
  animation: pop 0.5s ease;
}

@keyframes pop{
  from{transform:scale(0.8); opacity:0;}
  to{transform:scale(1); opacity:1;}
}

h2{
  margin-bottom:15px;
  color:#fff;
  font-size:24px;
  text-shadow:0 2px 5px rgba(0,0,0,0.2);
}

/* 🔘 toggle */
.toggle{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

.toggle button{
  width:48%;
  padding:10px;
  border:none;
  cursor:pointer;
  border-radius:12px;
  background: rgba(255,255,255,0.4);
  font-weight:bold;
  transition:0.3s;
}

.toggle button.active{
  background:#ff6f61;
  color:white;
  transform:scale(1.05);
}

/* ✍️ inputs */
input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:10px;
  outline:none;
  background: rgba(255,255,255,0.7);
  transition:0.3s;
}

input:focus{
  transform:scale(1.02);
  background:white;
}

/* 🚀 button */
.submit{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  background: linear-gradient(135deg, #ff6f61, #ff9966);
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
  font-weight:bold;
}

.submit:hover{
  transform:scale(1.05);
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

#studentFields{
  display:none;
}
</style>

</head>
<body>

<div class="container">

<h2 id="title">👶 Student Login</h2>

<div class="toggle">
  <button id="studentBtn" class="active">Student</button>
  <button id="adminBtn">Admin</button>
</div>

<form id="loginForm">

  <div id="studentFields">
    <input type="text" id="name" placeholder="Full Name">
    <input type="number" id="age" placeholder="Age">
  </div>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button class="submit" type="submit">🚀 Login</button>

</form>

</div>

<script>
let mode = "student";

const studentBtn = document.getElementById("studentBtn");
const adminBtn = document.getElementById("adminBtn");
const studentFields = document.getElementById("studentFields");
const title = document.getElementById("title");

studentBtn.onclick = () => {
  mode = "student";
  studentBtn.classList.add("active");
  adminBtn.classList.remove("active");

  studentFields.style.display = "block";
  title.innerText = "👶 Student Login";
};

adminBtn.onclick = () => {
  mode = "admin";
  adminBtn.classList.add("active");
  studentBtn.classList.remove("active");

  studentFields.style.display = "none";
  title.innerText = "🧑‍💼 Admin Login";
};

document.getElementById("loginForm").onsubmit = (e) => {
  e.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if(mode === "student"){
    const name = document.getElementById("name").value;
    const age = document.getElementById("age").value;

    if(!name || !age || !email || !password){
      alert("Fill all fields");
      return;
    }

    localStorage.setItem("role", "student");

    alert("Student Login Success 🎉");
    window.location.href = "index.html";
  }

  else{
    const ADMIN_EMAIL = "admin@gmail.com";
    const ADMIN_PASS = "1234";

    if(email === ADMIN_EMAIL && password === ADMIN_PASS){

      localStorage.setItem("role", "admin");

      alert("Admin Login Success 🎉");
      window.location.href = "index.html";

    } else {
      alert("Wrong Admin Credentials");
    }
  }
};
</script>

</body>
</html>
